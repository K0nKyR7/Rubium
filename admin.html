<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Максим Ковалёв</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(139, 69, 19, 0.08);
            border: 1px solid rgba(196, 162, 122, 0.2);
        }
        .login-box h1 { margin-bottom: 10px; color: #4A3728; }
        .login-box p { color: #9B8B75; margin-bottom: 30px; }
        .login-box input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 2px solid #F0E8DD; 
            border-radius: 28px; 
            font-size: 1rem; 
            margin-bottom: 20px;
            background: #FDF8F0;
            transition: all 0.3s;
        }
        .login-box input:focus {
            outline: none;
            border-color: #C4A27A;
            box-shadow: 0 0 0 4px rgba(196, 162, 122, 0.1);
        }
        .login-box button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white; 
            border: none; 
            border-radius: 40px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.2);
        }
        .error { color: #D4A574; margin-top: 15px; display: none; }
        
        .admin-panel { display: none; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header h1 { color: #4A3728; }
        .logout-btn {
            background: rgba(139, 69, 19, 0.1);
            border: 1px solid rgba(196, 162, 122, 0.3);
            padding: 10px 24px;
            border-radius: 40px;
            color: #6B4C3B;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #E8D5B7;
            transform: translateY(-2px);
        }
        
        .stats-bar {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        .stat-card {
            background: #FDF8F0;
            padding: 15px 25px;
            border-radius: 24px;
            text-align: center;
            flex: 1;
            min-width: 100px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.08);
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #A67B5B; }
        .stat-label { font-size: 0.85rem; color: #9B8B75; }
        
        .add-task-btn {
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .add-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.2);
        }
        
        .tasks-table {
            background: white;
            border-radius: 28px;
            overflow-x: auto;
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #F0E8DD; }
        th { background: #FDF8F0; font-weight: 600; color: #6B4C3B; }
        .edit-btn, .delete-btn { 
            padding: 6px 12px; 
            border-radius: 30px; 
            border: none; 
            cursor: pointer; 
            margin: 0 4px;
            transition: all 0.3s;
        }
        .edit-btn { background: #E8D5B7; color: #6B4C3B; }
        .edit-btn:hover { background: #C4A27A; color: white; transform: translateY(-2px); }
        .delete-btn { background: #F0D8CC; color: #B8734A; }
        .delete-btn:hover { background: #D4A574; color: white; transform: translateY(-2px); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 43, 31, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; color: #4A3728; }
        .modal-content textarea, .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #F0E8DD;
            border-radius: 24px;
            margin-bottom: 15px;
            font-family: inherit;
            background: #FDF8F0;
            transition: all 0.3s;
        }
        .modal-content textarea:focus, .modal-content input:focus, .modal-content select:focus {
            outline: none;
            border-color: #C4A27A;
            box-shadow: 0 0 0 4px rgba(196, 162, 122, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .save-btn { background: linear-gradient(135deg, #C4A27A, #A67B5B); color: white; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 69, 19, 0.2); }
        .cancel-btn { background: #F0E8DD; color: #6B4C3B; }
        .cancel-btn:hover { background: #E8D5B7; transform: translateY(-2px); }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #A67B5B;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-link:hover {
            color: #8B5E3C;
            transform: translateX(5px);
        }
        .success-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginBox" class="login-box">
        <h1>🔐 Админ-панель</h1>
        <p>Введите пароль для доступа</p>
        <input type="password" id="adminPassword" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
        <div id="loginError" class="error">Неверный пароль!</div>
    </div>
    
    <div id="adminPanel" class="admin-panel">
        <div class="header">
            <h1><i class="fas fa-crown"></i> Админ-панель</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="ogeTasks">0</div><div class="stat-label">ОГЭ задач</div></div>
            <div class="stat-card"><div class="stat-number" id="easyTasks">0</div><div class="stat-label">Лёгких</div></div>
            <div class="stat-card"><div class="stat-number" id="mediumTasks">0</div><div class="stat-label">Средних</div></div>
            <div class="stat-card"><div class="stat-number" id="hardTasks">0</div><div class="stat-label">Сложных</div></div>
        </div>
        
        <button class="add-task-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Добавить задачу</button>
        
        <div class="tasks-table">
            <table>
                <thead>
                    <tr><th>ID</th><th>Условие</th><th>ОГЭ</th><th>Номер</th><th>Вид</th><th>Сложность</th><th>Действия</th></tr>
                </thead>
                <tbody id="tasksTableBody"></tbody>
            </table>
        </div>
        
        <a href="tasks.html" class="back-link" target="_blank"><i class="fas fa-external-link-alt"></i> Перейти к сборнику задач</a>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Добавить задачу</h3>
        <textarea id="taskText" rows="3" placeholder="Условие задачи (можно использовать $...$ для формул)"></textarea>
        <input type="text" id="taskAnswer" placeholder="Ответ (десятичная дробь, например: 1.55)">
        <div class="form-row">
            <select id="taskOgeNumber">
                <option value="none">Не ОГЭ</option>
                <option value="6">6. Числа и вычисления</option>
            </select>
            <select id="taskVariant">
                <option value="Вид 1">Вид 1</option>
                <option value="Вид 2">Вид 2</option>
                <option value="Вид 3">Вид 3</option>
            </select>
        </div>
        <select id="taskDifficulty">
            <option value="easy">🟢 Лёгкая</option>
            <option value="medium">🟡 Средняя</option>
            <option value="hard">🔴 Сложная</option>
        </select>
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveTask()">Сохранить</button>
            <button class="cancel-btn" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<div id="successMsg" class="success-msg">✅ Задача добавлена!</div>

<script>
    const ADMIN_PASSWORD = "12345678";
    const STORAGE_KEY = "math_tasks";
    let editingTaskId = null;

    function showMessage(text, isError = false) {
        const msg = document.getElementById('successMsg');
        msg.textContent = isError ? '❌ ' + text : '✅ ' + text;
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
    }

    function loadTasks() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
        const defaultTasks = [
            { id: 601, text: "Найдите значение выражения $$\\frac{1}{10} + \\frac{29}{20}$$", exam: "oge", ogeNumber: "6", variant: "Вид 1", difficulty: "easy", difficultyName: "Лёгкий", answer: "1.55" },
            { id: 602, text: "Найдите значение выражения $$\\frac{1}{2} + \\frac{11}{10}$$", exam: "oge", ogeNumber: "6", variant: "Вид 1", difficulty: "easy", difficultyName: "Лёгкий", answer: "1.6" }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultTasks));
        return defaultTasks;
    }

    function saveTasks(tasks) { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
    function getTasks() { return loadTasks(); }

    function addTask(task) {
        const tasks = getTasks();
        const maxId = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) : 600;
        const newId = maxId + 1;
        tasks.push({ ...task, id: newId });
        saveTasks(tasks);
        renderTasksTable();
        showMessage('Задача добавлена! ID: ' + newId);
        return newId;
    }

    function updateTask(id, updatedTask) {
        const tasks = getTasks();
        const index = tasks.findIndex(t => t.id === id);
        if (index !== -1) {
            tasks[index] = { ...tasks[index], ...updatedTask };
            saveTasks(tasks);
            renderTasksTable();
            showMessage('Задача обновлена!');
        }
    }

    function deleteTask(id) {
        if (confirm('Удалить задачу?')) {
            const tasks = getTasks();
            saveTasks(tasks.filter(t => t.id !== id));
            renderTasksTable();
            showMessage('Задача удалена!');
        }
    }

    function renderTasksTable() {
        const tasks = getTasks();
        document.getElementById('totalTasks').textContent = tasks.length;
        document.getElementById('ogeTasks').textContent = tasks.filter(t => t.exam === 'oge').length;
        document.getElementById('easyTasks').textContent = tasks.filter(t => t.difficulty === 'easy').length;
        document.getElementById('mediumTasks').textContent = tasks.filter(t => t.difficulty === 'medium').length;
        document.getElementById('hardTasks').textContent = tasks.filter(t => t.difficulty === 'hard').length;
        
        const tbody = document.getElementById('tasksTableBody');
        if (tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Нет задач. Нажмите "Добавить задачу"</td></tr>';
            return;
        }
        
        tbody.innerHTML = tasks.map(task => `
            <tr>
                <td>${task.id}</td>
                <td style="max-width: 350px; word-break: break-word;">${escapeHtml(task.text.substring(0, 80))}${task.text.length > 80 ? '...' : ''}</td>
                <td>${task.exam === 'oge' ? '✅ Да' : '❌ Нет'}</td>
                <td>${task.ogeNumber || '-'}</td>
                <td>${task.variant || '-'}</td>
                <td>${task.difficulty === 'easy' ? '🟢 Лёгкий' : task.difficulty === 'medium' ? '🟡 Средний' : '🔴 Сложный'}</td>
                <td>
                    <button class="edit-btn" onclick="openEditModal(${task.id})"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" onclick="deleteTask(${task.id})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function openAddModal() {
        editingTaskId = null;
        document.getElementById('modalTitle').textContent = '➕ Добавить задачу';
        document.getElementById('taskText').value = '';
        document.getElementById('taskAnswer').value = '';
        document.getElementById('taskOgeNumber').value = '6';
        document.getElementById('taskVariant').value = 'Вид 1';
        document.getElementById('taskDifficulty').value = 'easy';
        document.getElementById('taskModal').classList.add('show');
    }

    function openEditModal(id) {
        const tasks = getTasks();
        const task = tasks.find(t => t.id === id);
        if (task) {
            editingTaskId = id;
            document.getElementById('modalTitle').textContent = '✏️ Редактировать задачу';
            document.getElementById('taskText').value = task.text;
            document.getElementById('taskAnswer').value = task.answer;
            document.getElementById('taskOgeNumber').value = task.ogeNumber || '6';
            document.getElementById('taskVariant').value = task.variant || 'Вид 1';
            document.getElementById('taskDifficulty').value = task.difficulty;
            document.getElementById('taskModal').classList.add('show');
        }
    }

    function closeModal() {
        document.getElementById('taskModal').classList.remove('show');
        editingTaskId = null;
    }

    function saveTask() {
        const text = document.getElementById('taskText').value.trim();
        const answer = document.getElementById('taskAnswer').value.trim();
        const ogeNumber = document.getElementById('taskOgeNumber').value;
        const variant = document.getElementById('taskVariant').value;
        const difficulty = document.getElementById('taskDifficulty').value;
        
        if (!text) { alert('Введите условие задачи!'); return; }
        if (!answer) { alert('Введите ответ!'); return; }
        
        let difficultyName = difficulty === "easy" ? "Лёгкий" : difficulty === "medium" ? "Средний" : "Сложный";
        const exam = ogeNumber !== 'none' ? "oge" : null;
        
        const taskData = {
            text: text, answer: answer, difficulty: difficulty, difficultyName: difficultyName,
            exam: exam, ogeNumber: ogeNumber !== 'none' ? ogeNumber : null, variant: variant
        };
        
        if (editingTaskId) { updateTask(editingTaskId, taskData); }
        else { addTask(taskData); }
        closeModal();
    }

    function checkPassword() {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderTasksTable();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    window.openAddModal = openAddModal;
    window.openEditModal = openEditModal;
    window.deleteTask = deleteTask;
    window.saveTask = saveTask;
    window.closeModal = closeModal;
    window.checkPassword = checkPassword;
    window.logout = logout;

    renderTasksTable();
</script>
</body>
</html>
