<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Stud&School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root {
            --bg: #FAF8FC;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #4B5563;
            --heading: #1F2937;
            --accent: #8B5CF6;
            --border: rgba(139, 92, 246, 0.12);
            --border-focus: rgba(139, 92, 246, 0.35);
            --shadow: 0 20px 50px rgba(139, 92, 246, 0.08);
            --error-bg: rgba(239, 68, 68, 0.05);
            --error-border: rgba(239, 68, 68, 0.15);
            --error-text: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(140px);
            opacity: 0.04;
        }

        body::before {
            width: 620px;
            height: 620px;
            background: #8B5CF6;
            top: -180px;
            right: -180px;
            animation: driftA 28s ease-in-out infinite;
        }

        body::after {
            width: 460px;
            height: 460px;
            background: #E11D8D;
            bottom: -130px;
            left: -130px;
            animation: driftB 32s ease-in-out infinite;
        }

        @keyframes driftA {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(-40px, 30px);
            }

            66% {
                transform: translate(20px, -15px);
            }
        }

        @keyframes driftB {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -25px);
            }

            66% {
                transform: translate(-15px, 30px);
            }
        }

        .login-box {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 44px 36px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
            text-decoration: none;
        }

        .logo img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            background: linear-gradient(135deg, #8B5CF6, #E11D8D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #9CA3AF;
            margin-bottom: 32px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #6B7280;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.5);
            color: var(--heading);
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.06);
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group input::placeholder {
            color: #B0B7C3;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.28s ease;
            letter-spacing: -0.3px;
        }

        .btn-primary {
            background: #8B5CF6;
            color: #fff;
            margin: 8px 0 20px;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            color: #9CA3AF;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .oauth-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-oauth {
            flex: 1;
            padding: 11px 8px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.4);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #6B7280;
            text-align: center;
        }

        .btn-oauth:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: var(--border-focus);
            color: #1F2937;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: #9CA3AF;
        }

        .link a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.82rem;
            border: 1px solid var(--error-border);
            font-weight: 500;
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            font-size: 0.82rem;
        }

        .back-link a {
            color: #9CA3AF;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #8B5CF6;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <a href="index.html" class="logo">
            <div class="logo-text"><span>Stud&</span>School</div>
        </a>
        <p class="subtitle">С возвращением</p>

        <div class="error" id="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="max@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Ваш пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>

        <div class="divider">или</div>

        <div class="oauth-row">
            <button class="btn-oauth" onclick="loginWithOAuth('vk')">VK ID</button>
            <button class="btn-oauth" onclick="loginWithOAuth('esia')">Госуслуги</button>
            <button class="btn-oauth" onclick="loginWithOAuth('yandex')">Yandex ID</button>
        </div>

        <div class="link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>
    </div>

    <script>
        var errorEl = document.getElementById('error');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(function () { errorEl.style.display = 'none'; }, 5000);
        }

        supabase.auth.signOut();

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Заполните email и пароль');
                return;
            }

            var { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                if (error.message.includes('Invalid login credentials')) {
                    showError('Неверный email или пароль');
                } else {
                    showError(error.message);
                }
                return;
            }

            if (!data.user) {
                showError('Ошибка входа');
                return;
            }

            window.location.href = 'profile.html';
        });

        async function loginWithOAuth(provider) {
            var { error } = await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { redirectTo: window.location.origin + '/profile.html' }
            });
            if (error) showError('Ошибка входа');
        }
    </script>

</body>

</html>
