<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubi AI — консультация | Stud&School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FAF8FC;
            color: #1F2937;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(140px);
            opacity: 0.04;
        }

        body::before {
            width: 620px;
            height: 620px;
            background: #8B5CF6;
            top: -180px;
            right: -180px;
            animation: driftA 28s ease-in-out infinite;
        }

        body::after {
            width: 460px;
            height: 460px;
            background: #E11D8D;
            bottom: -130px;
            left: -130px;
            animation: driftB 32s ease-in-out infinite;
        }

        @keyframes driftA {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(-40px, 30px);
            }

            66% {
                transform: translate(20px, -15px);
            }
        }

        @keyframes driftB {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -25px);
            }

            66% {
                transform: translate(-15px, 30px);
            }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.08);
            flex-shrink: 0;
            z-index: 10;
            background: rgba(250, 248, 252, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.15);
            background: transparent;
            color: #8B5CF6;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .btn-back:hover {
            background: rgba(139, 92, 246, 0.06);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .rubi-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #E11D8D);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }

        .rubi-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1F2937;
            letter-spacing: -0.3px;
        }

        .rubi-status {
            font-size: 0.7rem;
            color: #22C55E;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rubi-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22C55E;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.12);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: msgIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1.2) forwards;
            opacity: 0;
            transform: translateY(16px);
        }

        @keyframes msgIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #E11D8D);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.user .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8B5CF6;
            font-size: 0.8rem;
            flex-shrink: 0;
            font-weight: 700;
        }

        .message .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.88rem;
            line-height: 1.55;
            max-width: 75%;
            position: relative;
        }

        .message.bot .bubble {
            background: #fff;
            color: #4B5563;
            border: 1px solid rgba(139, 92, 246, 0.08);
            border-top-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .message.user .bubble {
            background: #8B5CF6;
            color: #fff;
            border-top-right-radius: 6px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            align-items: center;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #B0B7C3;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }

            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 12px 20px 20px;
            flex-shrink: 0;
            z-index: 1;
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
            background: #fff;
            border-radius: 50px;
            padding: 6px 6px 6px 20px;
            border: 1px solid rgba(139, 92, 246, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .chat-input-row:focus-within {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 4px 24px rgba(139, 92, 246, 0.08);
        }

        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            color: #1F2937;
            outline: none;
            padding: 10px 0;
            letter-spacing: -0.2px;
        }

        .chat-input::placeholder {
            color: #B0B7C3;
        }

        .btn-send {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #8B5CF6;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send:hover {
            background: #7C3AED;
            transform: scale(1.04);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #B0B7C3;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .header {
                padding: 10px 16px;
            }

            .chat-messages {
                padding: 16px 16px 8px;
            }

            .chat-input-area {
                padding: 8px 14px 16px;
            }

            .message .bubble {
                font-size: 0.82rem;
                max-width: 85%;
            }

            .btn-back {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }

            .rubi-avatar {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-left">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="rubi-avatar"><i class="fas fa-robot"></i></div>
            <div>
                <div class="rubi-name">Rubi AI</div>
                <div class="rubi-status">онлайн</div>
            </div>
        </div>
    </header>

    <div class="chat">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div class="bubble">
                    Привет! Я Rubi 👋<br>
                    Расскажи, какой предмет тебя интересует и к какому экзамену готовишься. Я подберу лучший курс под
                    твою задачу.
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chatInput" placeholder="Напиши сообщение..."
                    onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}">
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-hint">Rubi помогает подобрать курс. Личные данные защищены.</div>
        </div>
    </div>

    <script>
        var chatMessages = document.getElementById('chatMessages');
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var isProcessing = false;

        function addMessage(text, type) {
            var msg = document.createElement('div');
            msg.className = 'message ' + type;

            if (type === 'bot') {
                msg.innerHTML = '<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">' + text + '</div>';
            } else {
                var initial = localStorage.getItem('user_name') ? localStorage.getItem('user_name').charAt(0).toUpperCase() : '?';
                msg.innerHTML = '<div class="avatar">' + initial + '</div><div class="bubble">' + text + '</div>';
            }

            chatMessages.appendChild(msg);
            scrollToBottom();
        }

        function scrollToBottom() {
            requestAnimationFrame(function () {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function addTypingIndicator() {
            var indicator = document.createElement('div');
            indicator.className = 'message bot';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            chatMessages.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            var indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            if (isProcessing) return;

            var text = chatInput.value.trim();
            if (!text) return;

            isProcessing = true;
            addMessage(text, 'user');
            chatInput.value = '';
            sendBtn.disabled = true;
            addTypingIndicator();

            await new Promise(function (resolve) { setTimeout(resolve, 700 + Math.random() * 500); });

            try {
                var response = await fetch('http://localhost:5001/api/consult', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text, session_id: 'user_session_1' })
                });

                removeTypingIndicator();

                if (!response.ok) throw new Error('Server error');

                var data = await response.json();
                addMessage(data.response, 'bot');
            } catch (err) {
                removeTypingIndicator();
                addMessage('Ой, что-то пошло не так. Попробуй ещё раз.', 'bot');
            }

            isProcessing = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }

        chatInput.focus();
    </script>

</body>

</html>
