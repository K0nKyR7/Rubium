<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Stud&School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <style>
        :root {
            --bg: #FAF8FC;
            --card-bg: rgba(255, 255, 255, 0.65);
            --text: #4B5563;
            --heading: #1F2937;
            --accent: #8B5CF6;
            --accent-hover: #7C3AED;
            --accent-light: rgba(139, 92, 246, 0.08);
            --border: rgba(139, 92, 246, 0.12);
            --border-focus: rgba(139, 92, 246, 0.35);
            --shadow: 0 20px 50px rgba(139, 92, 246, 0.08);
            --shadow-hover: 0 12px 32px rgba(139, 92, 246, 0.18);
            --error-bg: rgba(239, 68, 68, 0.05);
            --error-border: rgba(239, 68, 68, 0.15);
            --error-text: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(140px);
            opacity: 0.04;
        }

        body::before {
            width: 620px;
            height: 620px;
            background: #8B5CF6;
            top: -180px;
            right: -180px;
            animation: driftA 28s ease-in-out infinite;
        }

        body::after {
            width: 460px;
            height: 460px;
            background: #E11D8D;
            bottom: -130px;
            left: -130px;
            animation: driftB 32s ease-in-out infinite;
        }

        @keyframes driftA {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(-40px, 30px);
            }

            66% {
                transform: translate(20px, -15px);
            }
        }

        @keyframes driftB {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -25px);
            }

            66% {
                transform: translate(-15px, 30px);
            }
        }

        .register-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 44px 36px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
            text-decoration: none;
        }

        .logo img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            background: linear-gradient(135deg, #8B5CF6, #E11D8D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #9CA3AF;
            margin-bottom: 32px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #6B7280;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.4);
            color: var(--heading);
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.06);
            background: rgba(255, 255, 255, 0.7);
        }

        .form-group input::placeholder {
            color: #B0B7C3;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.28s ease;
            letter-spacing: -0.3px;
        }

        .btn-primary {
            background: #8B5CF6;
            color: #fff;
            margin: 8px 0 20px;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 18px;
            font-size: 0.8rem;
            color: #9CA3AF;
            line-height: 1.4;
        }

        .checkbox-group input {
            margin-top: 2px;
            accent-color: #8B5CF6;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: #9CA3AF;
        }

        .link a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .link a:hover {
            border-color: #8B5CF6;
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.82rem;
            border: 1px solid var(--error-border);
            font-weight: 500;
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            font-size: 0.82rem;
        }

        .back-link a {
            color: #9CA3AF;
            text-decoration: none;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-link a:hover {
            color: #8B5CF6;
        }
    </style>
</head>

<body>

    <div class="register-box">
        <a href="index.html" class="logo">
            <img src="data/logo.png" alt="Stud&School">
            <div class="logo-text">Stud<span>&</span>School</div>
        </a>
        <p class="subtitle">Создать аккаунт</p>

        <div class="error" id="error"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="firstName" placeholder="Имя" required autocomplete="given-name">
            </div>
            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" id="lastName" placeholder="Фамилия" required autocomplete="family-name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ваша@почта.ру" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6"
                    autocomplete="new-password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agree" required>
                <label for="agree">Принимаю <a href="#">политику конфиденциальности</a> и согласен на обработку
                    данных</label>
            </div>

            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>

        <div class="link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>
    </div>

    <script>
        var errorEl = document.getElementById('error');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(function () { errorEl.style.display = 'none'; }, 5000);
        }

        function isRussianEmail(email) {
            var russianDomains = [
                '.ru', '.рф', '.su',
                'mail.ru', 'inbox.ru', 'list.ru', 'bk.ru',
                'yandex.ru', 'ya.ru',
                'rambler.ru', 'lenta.ru', 'autorambler.ru', 'myrambler.ru', 'ro.ru', 'r0.ru'
            ];
            var lowerEmail = email.toLowerCase();
            return russianDomains.some(function (domain) { return lowerEmail.endsWith(domain); });
        }

        // Сбрасываем сессию
        (async function () {
            await supabase.auth.signOut();
        })();

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var firstName = document.getElementById('firstName').value.trim();
            var lastName = document.getElementById('lastName').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!firstName || !lastName) {
                showError('Заполните имя и фамилию');
                return;
            }

            if (!isRussianEmail(email)) {
                showError('Пожалуйста, используйте российский email');
                return;
            }

            // Регистрируем в Supabase Auth
            var result = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        first_name: firstName,
                        last_name: lastName
                    }
                }
            });

            if (result.error) {
                var msg = result.error.message === 'User already registered'
                    ? 'Пользователь с таким email уже существует'
                    : result.error.message;
                showError(msg);
                return;
            }

            var user = result.data.user;

            if (user) {
                // Сохраняем имя в таблицу users
                var upsertResult = await supabase.from('users').upsert({
                    id: user.id,
                    email: user.email,
                    first_name: firstName,
                    last_name: lastName
                }, {
                    onConflict: 'id',
                    ignoreDuplicates: false
                });

                if (upsertResult.error) {
                    console.log('Users table upsert error:', upsertResult.error.message);
                }

                window.location.href = 'profile.html';
            } else {
                showError('Проверьте почту для подтверждения регистрации');
            }
        });
    </script>
</body>

</html>
