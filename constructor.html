<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор вариантов ОГЭ — Максим Ковалёв</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #FDF8F0;
            color: #4A3728;
            line-height: 1.5;
        }
        .navbar {
            background: rgba(255, 252, 245, 0.98);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(196, 162, 122, 0.2);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5C3D2E;
        }
        .logo span {
            background: linear-gradient(135deg, #8B5E3C, #C4A27A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: #6B4C3B;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #8B5E3C; }
        .tasks-btn, .constructor-btn {
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white !important;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .constructor-hero {
            background: linear-gradient(135deg, #F5EDE0 0%, #EFE4D5 100%);
            color: #4A3728;
            padding: 60px 0;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 0 0 40px 40px;
        }
        .constructor-hero h1 { font-size: 2.5rem; margin-bottom: 16px; color: #3D2B1F; }
        .constructor-hero p { font-size: 1.1rem; color: #5C4B3A; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #A67B5B;
            text-decoration: none;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .back-link:hover { opacity: 1; color: #8B5E3C; }

        .selection-panel {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.05);
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        .selection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #F0E8DD;
        }
        .selection-title {
            font-weight: 700;
            color: #4A3728;
            font-size: 1.1rem;
        }
        .select-all-btn {
            padding: 6px 16px;
            background: #F0E8DD;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            color: #6B4C3B;
        }
        .select-all-btn:hover {
            background: #C4A27A;
            color: white;
        }
        
        .numbers-group { margin-bottom: 20px; }
        .group-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6B4C3B;
            margin-bottom: 10px;
            padding-left: 4px;
        }
        .numbers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .number-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #FDF8F0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #F0E8DD;
        }
        .number-checkbox:hover {
            background: #F5EDE0;
            border-color: #C4A27A;
        }
        .number-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #C4A27A;
        }
        .number-checkbox label {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: #6B4C3B;
        }

        .top-control-panel {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        .bottom-control-panel {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-top: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        .control-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.2);
        }
        .control-btn.secondary {
            background: #F0E8DD;
            color: #6B4C3B;
        }
        .control-btn.secondary:hover {
            background: #E8D5B7;
        }
        .control-btn.success {
            background: #A67B5B;
            color: white;
        }

        .tasks-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }
        .task-item {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.05);
            border: 1px solid rgba(196, 162, 122, 0.15);
        }
        .task-header {
            background: linear-gradient(135deg, #FDF8F0, #F5EDE0);
            padding: 14px 20px;
            border-bottom: 1px solid #F0E8DD;
        }
        .task-number { font-weight: 700; color: #A67B5B; font-size: 1rem; }
        .task-body { padding: 20px; }
        .math-text {
            font-size: 1rem;
            background: #FDF8F0;
            padding: 14px 16px;
            border-radius: 20px;
            border-left: 4px solid #C4A27A;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .katex { font-size: 1.1rem; }
        
        .answer-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #F0E8DD;
        }
        .answer-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #F0E8DD;
            border-radius: 24px;
            font-size: 0.9rem;
            font-family: inherit;
            background: #FDF8F0;
            transition: all 0.3s;
        }
        .answer-input:focus {
            outline: none;
            border-color: #C4A27A;
            box-shadow: 0 0 0 4px rgba(196, 162, 122, 0.1);
        }
        .answer-input.correct { border-color: #A67B5B; background: #F5EDE0; }
        .answer-input.incorrect { border-color: #D4A574; background: #FDF0EC; }
        .answer-input.disabled { background: #FDF8F0; border-color: #F0E8DD; color: #B8A88A; }
        .feedback {
            margin-top: 8px;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            display: none;
        }
        .feedback.show { display: inline-block; }
        .feedback.correct { background: #F5EDE0; color: #A67B5B; }
        .feedback.incorrect { background: #FDF0EC; color: #D4A574; }

        .empty-message {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 28px;
            color: #9B8B75;
        }
        
        .save-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            display: none;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 43, 31, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 32px;
            max-width: 90%;
            width: auto;
            min-width: 300px;
            text-align: center;
        }
        .modal-content h3 { margin-bottom: 16px; color: #4A3728; }
        .modal-content p { margin-bottom: 20px; color: #6B4C3B; }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }
        .modal-buttons button {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #C4A27A, #A67B5B);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 69, 19, 0.2); }
        .btn-secondary {
            background: #F0E8DD;
            color: #6B4C3B;
        }
        .btn-secondary:hover { background: #E8D5B7; }
        .btn-danger {
            background: #D4A574;
            color: white;
        }
        .btn-danger:hover { transform: translateY(-2px); }
        
        .results-modal-content {
            max-width: 900px;
            width: 95%;
            text-align: left;
            max-height: 85vh;
            overflow-y: auto;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.85rem;
        }
        .results-table th, .results-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #F0E8DD;
        }
        .results-table th {
            background: #FDF8F0;
            font-weight: 600;
            color: #6B4C3B;
            position: sticky;
            top: 0;
        }
        .results-table td:first-child, .results-table th:first-child {
            text-align: left;
            font-weight: 600;
        }
        .correct-answer { color: #A67B5B; font-weight: 600; }
        .incorrect-answer { color: #D4A574; font-weight: 600; }
        .empty-answer { color: #B8A88A; }
        .score-badge {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }
        .score-correct { background: #F5EDE0; color: #A67B5B; }
        .score-incorrect { background: #FDF0EC; color: #D4A574; }
        .score-empty { background: #F0E8DD; color: #9B8B75; }
        .results-summary-bar {
            background: #FDF8F0;
            padding: 16px 20px;
            border-radius: 24px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .total-score { font-size: 1.5rem; font-weight: 700; color: #A67B5B; }
        .warning-text { color: #D4A574; font-size: 0.85rem; }
        .celebration-text { color: #A67B5B; font-weight: 600; }
        
        footer {
            background: #3D2B1F;
            color: #E8D5B7;
            padding: 48px 0 24px;
            margin-top: 40px;
        }
        .footer-content { text-align: center; }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .footer-links a { color: #D4B28A; text-decoration: none; opacity: 0.8; transition: opacity 0.3s; }
        .footer-links a:hover { opacity: 1; }
        @media (max-width: 768px) {
            .constructor-hero h1 { font-size: 1.8rem; }
            .task-header { flex-direction: column; align-items: flex-start; }
            .control-btn { padding: 8px 16px; font-size: 0.8rem; }
            .number-checkbox { padding: 4px 8px; }
            .number-checkbox label { font-size: 0.8rem; }
            .results-table th, .results-table td { padding: 8px 4px; font-size: 0.7rem; }
            .results-modal-content { padding: 20px; }
        }
    </style>
</head>
<body>
<!-- ВСЁ ОСТАЛЬНОЕ СОДЕРЖИМОЕ constructor.html ОСТАЁТСЯ БЕЗ ИЗМЕНЕНИЙ -->

</body>
</html>
