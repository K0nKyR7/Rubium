<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Stud&School</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root {
            --bg: #FAF8FC;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #4B5563;
            --heading: #1F2937;
            --accent: #8B5CF6;
            --border: rgba(139, 92, 246, 0.12);
            --shadow: 0 20px 50px rgba(139, 92, 246, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(140px);
            opacity: 0.04;
        }

        body::before {
            width: 620px;
            height: 620px;
            background: #8B5CF6;
            top: -180px;
            right: -180px;
            animation: driftA 28s ease-in-out infinite;
        }

        body::after {
            width: 460px;
            height: 460px;
            background: #E11D8D;
            bottom: -130px;
            left: -130px;
            animation: driftB 32s ease-in-out infinite;
        }

        @keyframes driftA {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(-40px, 30px);
            }

            66% {
                transform: translate(20px, -15px);
            }
        }

        @keyframes driftB {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -25px);
            }

            66% {
                transform: translate(-15px, 30px);
            }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 248, 252, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #8B5CF6;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            background: transparent;
            color: #8B5CF6;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.28s ease;
            white-space: nowrap;
        }

        .btn-home:hover {
            background: rgba(139, 92, 246, 0.05);
        }

        .btn-logout {
            padding: 9px 20px;
            border-radius: 50px;
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            background: transparent;
            color: #EF4444;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.28s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.05);
        }

        .main {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            width: 100%;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #E11D8D);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            font-weight: 800;
            flex-shrink: 0;
        }

        .profile-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--heading);
            letter-spacing: -0.5px;
        }

        .profile-info p {
            color: #9CA3AF;
            font-size: 0.9rem;
            margin-top: 2px;
            word-break: break-all;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .role-student {
            background: rgba(139, 92, 246, 0.08);
            color: #8B5CF6;
        }

        .role-teacher {
            background: rgba(225, 29, 141, 0.07);
            color: #E11D8D;
        }

        .role-admin {
            background: rgba(239, 68, 68, 0.08);
            color: #EF4444;
        }

        .cards {
            display: grid;
            gap: 16px;
        }

        .info-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 20px 22px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .info-card h3 {
            font-size: 0.75rem;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(139, 92, 246, 0.05);
            font-size: 0.88rem;
            gap: 12px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6B7280;
            font-weight: 500;
            flex-shrink: 0;
        }

        .info-value {
            color: var(--heading);
            font-weight: 600;
            text-align: right;
            word-break: break-all;
        }

        .lead-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(139, 92, 246, 0.05);
        }

        .lead-item:last-child {
            border-bottom: none;
        }

        .lead-item-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .lead-item-header strong {
            font-size: 0.88rem;
            color: var(--heading);
        }

        .lead-item-date {
            color: #9CA3AF;
            font-size: 0.75rem;
        }

        .lead-item-phone {
            font-size: 0.8rem;
            color: #6B7280;
        }

        .lead-status {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            width: fit-content;
        }

        .lead-status.new {
            background: rgba(139, 92, 246, 0.08);
            color: #8B5CF6;
        }

        .lead-status.done {
            background: rgba(34, 197, 94, 0.08);
            color: #22C55E;
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 20px;
            }

            .logo {
                font-size: 1.15rem;
                gap: 8px;
            }

            .logo img {
                width: 32px;
                height: 32px;
            }

            .btn-home span,
            .btn-logout span {
                display: none;
            }

            .btn-home,
            .btn-logout {
                padding: 9px 14px;
                font-size: 0.85rem;
            }

            .main {
                padding: 32px 20px 60px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 14px;
            }

            .avatar {
                width: 72px;
                height: 72px;
                font-size: 1.8rem;
                margin: 0 auto;
            }

            .profile-info h1 {
                font-size: 1.3rem;
            }

            .info-card {
                padding: 16px 18px;
                border-radius: 16px;
            }

            .info-row {
                font-size: 0.82rem;
                padding: 8px 0;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 14px;
            }

            .main {
                padding: 24px 14px 48px;
            }

            .avatar {
                width: 64px;
                height: 64px;
                font-size: 1.5rem;
            }

            .info-card {
                padding: 14px;
                border-radius: 14px;
            }

            .info-card h3 {
                font-size: 0.7rem;
                margin-bottom: 8px;
            }

            .info-row {
                font-size: 0.78rem;
                padding: 7px 0;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo">
            <img src="data/logo.png" alt="Stud&School">Stud&School
        </a>
        <div class="header-right">
            <a href="index.html" class="btn-home"><i class="fas fa-home"></i> <span>На главную</span></a>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> <span>Выйти</span>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="profile-header">
            <div class="avatar" id="avatarLetter">?</div>
            <div class="profile-info">
                <h1 id="profileName">—</h1>
                <p id="profileEmail">—</p>
                <span class="role-badge" id="roleBadge" style="display:none;">—</span>
            </div>
        </div>

        <div class="cards">
            <div class="info-card">
                <h3>Личные данные</h3>
                <div class="info-row">
                    <span class="info-label">Имя</span>
                    <span class="info-value" id="infoFirstName">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Фамилия</span>
                    <span class="info-value" id="infoLastName">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="infoEmail">—</span>
                </div>
            </div>

            <div class="info-card">
                <h3>Аккаунт</h3>
                <div class="info-row">
                    <span class="info-label">Статус</span>
                    <span class="info-value" id="infoRole" style="color:#8B5CF6;">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Дата регистрации</span>
                    <span class="info-value" id="infoDate">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Мои курсы</span>
                    <span class="info-value"><a href="courses.html" style="color:#8B5CF6;text-decoration:none;">Перейти
                            <i class="fas fa-arrow-right" style="font-size:0.7rem;"></i></a></span>
                </div>
            </div>

            <div class="info-card" id="leadsSection" style="display:none;">
                <h3>📋 Входящие заявки</h3>
                <div id="leadsList">
                    <p style="color:#9CA3AF;text-align:center;padding:20px;">Загрузка...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadProfile() {
            var { data: { user }, error } = await supabase.auth.getUser();

            if (error || !user) {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
                return;
            }

            var firstName = user.user_metadata?.first_name || '';
            var lastName = user.user_metadata?.last_name || '';
            var fullName = (firstName + ' ' + lastName).trim() || 'Профиль';

            var { data: profile } = await supabase
                .from('users')
                .select('role')
                .eq('id', user.id)
                .single();

            var role = profile?.role || 'student';
            var roleLabels = {
                'student': 'Ученик',
                'teacher': 'Преподаватель',
                'admin': 'Администратор'
            };
            var roleClasses = {
                'student': 'role-student',
                'teacher': 'role-teacher',
                'admin': 'role-admin'
            };

            document.getElementById('avatarLetter').textContent = fullName.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = fullName;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('infoFirstName').textContent = firstName || '—';
            document.getElementById('infoLastName').textContent = lastName || '—';
            document.getElementById('infoEmail').textContent = user.email;
            document.getElementById('infoRole').textContent = roleLabels[role] || 'Ученик';
            document.getElementById('infoDate').textContent = user.created_at
                ? new Date(user.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
                : '—';

            var badge = document.getElementById('roleBadge');
            badge.textContent = roleLabels[role];
            badge.className = 'role-badge ' + (roleClasses[role] || 'role-student');
            badge.style.display = 'inline-block';

            if (role === 'teacher' || role === 'admin') {
                document.getElementById('leadsSection').style.display = 'block';
                loadLeads();
            }
        }

        async function loadLeads() {
            try {
                var response = await fetch('http://localhost:5001/api/leads');
                var leads = await response.json();

                var container = document.getElementById('leadsList');

                if (!leads || leads.length === 0) {
                    container.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:20px;">Пока нет заявок</p>';
                    return;
                }

                container.innerHTML = '';
                leads.forEach(function (lead) {
                    var item = document.createElement('div');
                    item.className = 'lead-item';
                    item.innerHTML = `
                <div class="lead-item-header">
                    <strong>${lead.course_title || 'Курс не указан'}</strong>
                    <span class="lead-item-date">${new Date(lead.created_at).toLocaleDateString('ru-RU')}</span>
                </div>
                <span class="lead-item-phone">👤 ${lead.client_name || 'Имя не указано'}</span>
                <span class="lead-item-phone">📞 ${lead.phone || 'Телефон не указан'}</span>
                <span class="lead-item-phone">👨‍🏫 ${lead.teacher_name || 'Преподаватель не назначен'}</span>
                <span class="lead-status ${lead.status === 'new' ? 'new' : 'done'}">${lead.status === 'new' ? 'Новая' : 'Обработана'}</span>
            `;
                    container.appendChild(item);
                });
            } catch (e) {
                document.getElementById('leadsList').innerHTML = '<p style="color:#EF4444;text-align:center;padding:20px;">Ошибка загрузки заявок</p>';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadProfile();
    </script>

</body>

</html>
